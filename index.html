<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Blocks</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="game-container">

<header>
<h1>🧩 Puzzle Blocks</h1>
<div class="top-bar">
<div>Score: <span id="score">0</span></div>
<button id="dailyBtn">🎁 Daily Reward</button>
<button id="leaderBtn">🏆 Leaderboard</button>
</div>
</header>

<main>
<canvas id="game"></canvas>
</main>

<div class="controls">
<button id="startBtn">Start Game</button>
<button id="restartBtn">Restart</button>
</div>

</div>

<div class="leaderboard" id="leaderboard">
<h2>Leaderboard</h2>
<ul id="leaderList"></ul>
<button onclick="closeLeader()">Close</button>
</div>

<div class="daily" id="daily">
<h2>Daily Reward</h2>
<p>You received <span id="reward">0</span> coins!</p>
<button onclick="closeDaily()">Close</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="script.js"></script>
</body>
</html>
